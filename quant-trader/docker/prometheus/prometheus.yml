# ─────────────────────────────────────────────────────────────────────────────
# Prometheus — QuantexPro scraping config
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: "quantexpro"

scrape_configs:
  - job_name: "quantex-engine"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["engine:8000"]
        labels:
          service: "trading-engine"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
        labels:
          service: "redis"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
        labels:
          service: "postgres"