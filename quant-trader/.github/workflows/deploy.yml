# ─────────────────────────────────────────────────────────────────────────────
# QuantexPro — CD Pipeline
# Deploys to production EC2 on push to main.
#
# Uses SSH agent forwarding + Docker Compose on target host.
# Secrets must be configured in GitHub repo settings:
#   PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_KEY, PROD_ENV_FILE (base64)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.engine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/engine:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/engine:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/quantexpro

            # Write environment file from secret
            echo "${{ secrets.PROD_ENV_FILE }}" | base64 -d > .env.production

            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Graceful rolling restart
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --scale engine=2 engine
            sleep 10

            # Verify health
            for i in 1 2 3; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Health check passed"
                break
              fi
              sleep 5
            done

            # Scale down old engine
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --scale engine=1 engine

            # Restart other services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Prune old images
            docker image prune -af