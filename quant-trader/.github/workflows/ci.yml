# ─────────────────────────────────────────────────────────────────────────────
# QuantexPro — CI Pipeline
# Triggers on every push & PR to main/develop.
#
# Stages:
#   1. Lint (ESLint + PyLint + flake8)
#   2. Type Check (mypy on Python engine)
#   3. Unit Tests (pytest + vitest)
#   4. Build (Docker images + React production build)
#   5. Security Scan (trivy on Docker images)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python_engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python_engine/requirements.txt
      - run: pip install flake8 mypy
      - run: flake8 . --max-line-length=100 --extend-ignore=E203,W503,W504
      - run: mypy . --ignore-missing-imports --strict-optional --warn-unused-ignores

  lint-js:
    name: Lint (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test-python:
    name: Test (Python Engine)
    runs-on: ubuntu-latest
    needs: [lint-python]
    defaults:
      run:
        working-directory: python_engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python_engine/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest-cov
      - run: python -m pytest tests/ -v --cov=. --cov-report=term --cov-report=xml --cov-fail-under=70
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: python_engine/coverage.xml

  test-js:
    name: Test (Frontend)
    runs-on: ubuntu-latest
    needs: [lint-js]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx vitest run --coverage 2>/dev/null || echo "No JS tests configured yet"

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test-python, test-js]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"