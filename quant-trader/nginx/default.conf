# ─────────────────────────────────────────────────────────────────────────────
# Nginx — QuantexPro Web + API reverse proxy
# ─────────────────────────────────────────────────────────────────────────────

upstream api_backend {
    server engine:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets (immutable cache) ──────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # ── API reverse proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering off;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # ── WebSocket proxy for real-time streaming ──────────────────────────────
    location /ws/ {
        proxy_pass http://api_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
}

# Rate limit zone definition
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;